name: Build and Publish Firmware

on:
  push:
    branches:
      - baymesh-refactor

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: baymesh-refactor
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Install PlatformIO
        run: pip install -U platformio

      - name: Build tlora-v2-1-1_6
        run: pio run -e tlora-v2-1-1_6

      - name: Upload artifact
        uses: actions/upload-artifact@v8
        with:
          name: firmware-builds
          path: .pio/build/tlora-v2-1-1_6/release/*
          retention-days: 7

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Get version
        run: |
          VERSION=$(git log -1 --format='2.7.21.%h')
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          name: firmware-builds
          path: ./firmware

      - name: Checkout firmware-pages
        uses: actions/checkout@v6
        with:
          repository: baymesh/bayme.sh-firmware-pages
          path: firmware-pages
          token: ${{ secrets.GH_TOKEN }}

      - name: Package and publish
        run: |
          cd firmware-pages
          rm -rf $VERSION || true
          mkdir -p $VERSION
          cp ../firmware/* $VERSION/ 2>/dev/null || true
          zip -r $VERSION.zip $VERSION
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add -A
          git diff --cached --stat || echo "nothing to commit"

      - name: Push
        uses: ad-m/github-push-action@master
        with:
          repository: baymesh/bayme.sh-firmware-pages
          token: ${{ secrets.GH_TOKEN }}
          directory: firmware-pages
          force: true
