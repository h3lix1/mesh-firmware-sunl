name: Build and Publish Firmware

on:
  push:
    branches:
      - baymesh-refactor
  workflow_dispatch:
    inputs:
      version:
        description: "Optional firmware version override (defaults to 2.7.21.<short-sha>)"
        required: false
        type: string
  workflow_call:
    inputs:
      version:
        description: "Optional firmware version override (defaults to 2.7.21.<short-sha>)"
        required: false
        type: string

concurrency:
  group: baymesh-firmware-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  resolve-targets:
    runs-on: ubuntu-latest
    outputs:
      build_matrix: ${{ steps.resolve.outputs.build_matrix }}
    steps:
      - name: Checkout firmware repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          ref: baymesh-refactor

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install PlatformIO
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade platformio

      - name: Resolve Baymesh target matrix
        id: resolve
        shell: bash
        run: |
          python <<'PY'
          import json
          import pathlib
          import subprocess

          repo = pathlib.Path.cwd()
          wanted = json.loads((repo / ".github" / "baymesh-targets.json").read_text(encoding="utf-8"))
          matrix = json.loads(subprocess.check_output(
              ["python", "bin/generate_ci_matrix.py", "all", "--level", "extra"],
              text=True,
              cwd=repo,
          ))

          matrix_by_board = {entry["board"]: entry for entry in matrix if not entry["board"].endswith("_dbg")}
          resolved = [matrix_by_board[name] for name in wanted if name in matrix_by_board]
          missing = [name for name in wanted if name not in matrix_by_board]

          if missing:
              raise SystemExit(f"Missing Baymesh targets in CI matrix: {', '.join(missing)}")

          output_path = pathlib.Path("/tmp/baymesh-build-matrix.json")
          output_path.write_text(json.dumps(resolved), encoding="utf-8")

          with pathlib.Path("/tmp/baymesh-github-output.txt").open("w", encoding="utf-8") as handle:
              handle.write("build_matrix=")
              handle.write(json.dumps(resolved))
              handle.write("\n")
          PY

          cat /tmp/baymesh-github-output.txt >> "$GITHUB_OUTPUT"

  build:
    needs: resolve-targets
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    strategy:
      fail-fast: false
      matrix:
        build: ${{ fromJson(needs.resolve-targets.outputs.build_matrix) }}
    steps:
      - name: Checkout firmware repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: baymesh-refactor
          submodules: recursive

      - name: Resolve firmware version
        id: version
        shell: bash
        run: |
          VERSION="${{ inputs.version }}"
          if [ -z "$VERSION" ]; then
            VERSION="2.7.21.$(git rev-parse --short=7 HEAD)"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install PlatformIO
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade platformio

      - name: Build ${{ matrix.build.board }}
        run: pio run -e ${{ matrix.build.board }}

      - name: Collect ${{ matrix.build.board }} artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "dist/${{ matrix.build.board }}"
          find ".pio/build/${{ matrix.build.board }}" -maxdepth 1 -type f \
            \( -name '*.bin' -o -name '*.uf2' -o -name '*.hex' -o -name '*.zip' -o -name '*.json' -o -name '*.mt.json' \) \
            -exec cp {} "dist/${{ matrix.build.board }}/" \;
          find "dist/${{ matrix.build.board }}" -maxdepth 1 -type f -print
          test -n "$(find "dist/${{ matrix.build.board }}" -maxdepth 1 -type f | head -n 1)"

      - name: Upload ${{ matrix.build.board }} artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.build.board }}
          path: dist/${{ matrix.build.board }}/*
          if-no-files-found: error
          retention-days: 7

  publish:
    needs: build
    # Run even if some boards failed (IRAM overflow, missing tools) as long as build wasn't skipped/cancelled
    if: ${{ !cancelled() && needs.build.result != 'skipped' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      VERSION: ${{ needs.build.outputs.version }}
    steps:
      - name: Checkout firmware repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          ref: baymesh-refactor

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: artifacts
          merge-multiple: true

      - name: Verify artifacts
        shell: bash
        run: |
          count=$(find artifacts -maxdepth 1 -type f \( -name '*.bin' -o -name '*.uf2' -o -name '*.hex' \) | wc -l)
          echo "Found $count firmware artifacts"
          if [ "$count" -eq 0 ]; then
            echo "No firmware artifacts found — all boards failed to build. Aborting publish."
            exit 1
          fi

      - name: Checkout firmware-pages
        uses: actions/checkout@v6
        with:
          repository: baymesh/bayme.sh-firmware-pages
          ref: gh-pages
          path: firmware-pages
          token: ${{ secrets.GH_TOKEN }}

      - name: Package release
        shell: bash
        run: |
          set -euo pipefail

          RELEASE_DIR="firmware-$VERSION"
          PAGES_DIR="$GITHUB_WORKSPACE/firmware-pages"
          STAGING_DIR="$GITHUB_WORKSPACE/staging/$RELEASE_DIR"
          ROOT_MANIFEST="$PAGES_DIR/firmware-$VERSION.json"
          ROOT_ZIP="$PAGES_DIR/firmware-$VERSION.zip"

          mkdir -p "$STAGING_DIR"
          find "$GITHUB_WORKSPACE/artifacts" -maxdepth 1 -type f \
            \( -name '*.bin' -o -name '*.uf2' -o -name '*.hex' -o -name '*.zip' -o -name '*.json' \) \
            -exec cp {} "$STAGING_DIR/" \;
          cp "$GITHUB_WORKSPACE/docs/baymesh-release-notes.md" "$STAGING_DIR/release_notes.md"

          python <<'PY'
          import json
          import os
          import re
          from datetime import datetime, timezone

          version = os.environ["VERSION"]
          staging_dir = os.path.join(os.environ["GITHUB_WORKSPACE"], "staging", f"firmware-{version}")
          release_manifest_path = os.path.join(staging_dir, f"firmware-{version}.json")

          # Prefer uf2 > bin > hex as the primary flashable file per board
          PRIORITY = {"uf2": 0, "bin": 1, "hex": 2}

          targets = {}
          for name in os.listdir(staging_dir):
            m = re.match(rf"^firmware-(.+)-{re.escape(version)}\.(uf2|bin|hex)$", name)
            if not m:
              continue
            board, ext = m.group(1), m.group(2)
            # skip factory.bin — it's a separate artifact
            if board.endswith(".factory"):
              continue
            if board not in targets or PRIORITY.get(ext, 99) < PRIORITY.get(targets[board]["type"], 99):
              targets[board] = {"board": board, "firmware": name, "type": ext}

          build_date = datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ")
          manifest = {
            "version": version,
            "build_date": build_date,
            "targets": [targets[b] for b in sorted(targets)],
          }

          with open(release_manifest_path, "w", encoding="utf-8") as handle:
            json.dump(manifest, handle, indent=2)
            handle.write("\n")
          PY

          rm -rf "$PAGES_DIR/$RELEASE_DIR"
          mkdir -p "$PAGES_DIR/$RELEASE_DIR"
          cp -R "$STAGING_DIR/." "$PAGES_DIR/$RELEASE_DIR/"
          cp "$PAGES_DIR/$RELEASE_DIR/firmware-$VERSION.json" "$ROOT_MANIFEST"

          # Write latest.json so the flasher can always find the newest version
          python <<'PY'
          import json, os
          version = os.environ['VERSION']
          pages_dir = os.path.join(os.environ['GITHUB_WORKSPACE'], 'firmware-pages')
          latest = {'version': version}
          with open(os.path.join(pages_dir, 'latest.json'), 'w') as f:
              json.dump(latest, f, indent=2)
              f.write('\n')
          PY

          rm -f "$ROOT_ZIP"
          (
            cd "$PAGES_DIR"
            zip -rq "firmware-$VERSION.zip" "$RELEASE_DIR"
          )

      - name: Commit and push
        shell: bash
        run: |
          cd firmware-pages
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add "firmware-$VERSION" "firmware-$VERSION.json" "firmware-$VERSION.zip" "latest.json"
          git diff --cached --quiet && exit 0
          git commit -m "Publish firmware $VERSION"
          git push origin gh-pages
